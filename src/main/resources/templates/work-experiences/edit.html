<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: header(${activePage})}"></div>
<div th:replace="~{fragments/layout :: messages}"></div>

<main class="shell page">
    <section class="page-top">
        <div>
            <p class="eyebrow">Форма</p>
            <h1 th:text="'Редактирование записи о работе: ' + ${workExperience.company.name}">Редактирование записи о работе</h1>
            <p class="muted-text">Каркас редактирования истории работы с уже подставленными данными записи.</p>
        </div>
        <a class="button secondary" id="work-experience-edit-back-link" th:href="${backLink}">Назад</a>
    </section>

    <section class="panel form-panel">
        <div class="info-box">
            Если дата окончания пустая, запись считается текущим местом работы. При сохранении проверяется отсутствие пересечений дат.
        </div>

        <form class="entity-form" method="post" th:action="${formAction}" th:object="${workExperienceForm}">
            <div class="message error" th:if="${#fields.hasErrors('*')}">
                <p>Форма содержит ошибки:</p>
                <ul class="error-list">
                    <li th:each="error : ${#fields.errors('*')}" th:text="${error}">Ошибка</li>
                </ul>
            </div>

            <label>
                <span>Компания</span>
                <select id="work-company-input" th:field="*{companyId}">
                    <option th:each="company : ${companies}" th:value="${company.id}" th:text="${company.name}">
                        Компания
                    </option>
                </select>
                <small class="field-error" th:errors="*{companyId}"></small>
            </label>

            <label>
                <span>Должность</span>
                <input id="work-position-input" th:field="*{position}" type="text">
                <small class="field-error" th:errors="*{position}"></small>
            </label>

            <label>
                <span>Зарплата</span>
                <input class="salary-input" id="work-salary-input" step="10000" th:field="*{salary}" type="number">
                <small class="field-error" th:errors="*{salary}"></small>
            </label>

            <label>
                <span>Дата начала</span>
                <input id="work-start-input" th:field="*{startDate}" type="date">
                <small class="field-error" th:errors="*{startDate}"></small>
            </label>

            <label>
                <span>Дата окончания</span>
                <input id="work-end-input" th:field="*{endDate}" type="date">
                <small class="field-error" th:errors="*{endDate}"></small>
            </label>

            <div class="form-actions">
                <button class="button primary" id="save-work-experience-button" type="submit">Сохранить запись</button>
                <a class="button secondary" th:href="${backLink}">Отмена</a>
            </div>
        </form>

        <div class="hero-actions top-gap">
            <form class="inline-form" method="post" th:action="${deleteAction}">
                <button class="button danger" id="delete-work-experience-button" type="submit">Удалить запись</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
