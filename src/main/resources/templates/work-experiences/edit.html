<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: header(${activePage})}"></div>
<div th:replace="~{fragments/layout :: messages}"></div>

<main class="shell page">
    <section class="page-top">
        <div>
            <p class="eyebrow">Форма</p>
            <h1 th:text="'Редактирование записи о работе: ' + ${workExperience.company.name}">Редактирование записи о работе</h1>
            <p class="muted-text">Каркас редактирования истории работы с уже подставленными данными записи.</p>
        </div>
        <a class="button secondary" id="work-experience-edit-back-link" th:href="${backLink}">Назад</a>
    </section>

    <section class="panel form-panel">
        <div class="info-box">
            Здесь будут проверки пересечения дат и сохранение записи. Сейчас страница нужна как полноценный экран навигации.
        </div>

        <form class="entity-form" th:object="${workExperienceForm}">
            <label>
                <span>Компания</span>
                <select id="work-company-input" th:field="*{companyId}">
                    <option th:each="company : ${companies}" th:value="${company.id}" th:text="${company.name}">
                        Компания
                    </option>
                </select>
            </label>

            <label>
                <span>Должность</span>
                <input id="work-position-input" th:field="*{position}" type="text">
            </label>

            <label>
                <span>Зарплата</span>
                <input id="work-salary-input" step="10000" th:field="*{salary}" type="number">
            </label>

            <label>
                <span>Дата начала</span>
                <input id="work-start-input" th:field="*{startDate}" type="date">
            </label>

            <label>
                <span>Дата окончания</span>
                <input id="work-end-input" th:field="*{endDate}" type="date">
            </label>

            <div class="form-actions">
                <button class="button primary" disabled id="save-work-experience-button" type="button">Сохранение будет добавлено позже</button>
                <a class="button secondary" th:href="${backLink}">Отмена</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
