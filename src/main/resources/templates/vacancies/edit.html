<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: header(${activePage})}"></div>
<div th:replace="~{fragments/layout :: messages}"></div>

<main class="shell page">
    <section class="page-top">
        <div>
            <p class="eyebrow">Форма</p>
            <h1 th:text="'Редактирование вакансии: ' + ${vacancy.position}">Редактирование вакансии</h1>
            <p class="muted-text">Каркас формы редактирования с уже загруженными данными вакансии.</p>
        </div>
        <a class="button secondary" id="vacancy-edit-back-link" th:href="${backLink}">Назад</a>
    </section>

    <section class="panel form-panel">
        <form class="entity-form" method="post" th:action="${formAction}" th:object="${vacancyForm}">
            <div class="message error" th:if="${#fields.hasErrors('*')}">
                <p>Форма содержит ошибки:</p>
                <ul class="error-list">
                    <li th:each="error : ${#fields.errors('*')}" th:text="${error}">Ошибка</li>
                </ul>
            </div>

            <label>
                <span>Компания</span>
                <select id="vacancy-company-input" th:field="*{companyId}">
                    <option th:each="companyOption : ${companies}"
                            th:value="${companyOption.id}"
                            th:text="${companyOption.name}">
                        Компания
                    </option>
                </select>
                <small class="field-error" th:errors="*{companyId}"></small>
            </label>

            <label>
                <span>Должность</span>
                <input id="vacancy-position-input" th:field="*{position}" type="text">
                <small class="field-error" th:errors="*{position}"></small>
            </label>

            <label>
                <span>Зарплата</span>
                <input class="salary-input" id="vacancy-salary-input" step="10000" th:field="*{salary}" type="number">
                <small class="field-error" th:errors="*{salary}"></small>
            </label>

            <label>
                <span>Требование к образованию</span>
                <input id="vacancy-education-input" th:field="*{requiredEducation}" type="text">
                <small class="field-error" th:errors="*{requiredEducation}"></small>
            </label>

            <label>
                <span>Требования к послужному списку</span>
                <textarea id="vacancy-requirements-input" rows="5" th:field="*{requirements}"></textarea>
                <small class="field-error" th:errors="*{requirements}"></small>
            </label>

            <label>
                <span>Статус</span>
                <select id="vacancy-status-input" th:field="*{status}">
                    <option th:value="true">Открыта</option>
                    <option th:value="false">Закрыта</option>
                </select>
                <small class="field-error" th:errors="*{status}"></small>
            </label>

            <div class="form-actions">
                <button class="button primary" id="save-vacancy-button" type="submit">Сохранить вакансию</button>
                <a class="button secondary" th:href="${backLink}">Отмена</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
