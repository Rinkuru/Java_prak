spring.application.name=java-prak

# Подключение к основной PostgreSQL-базе кадрового агентства.
spring.datasource.url=jdbc:postgresql://localhost:5432/hr_agency
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate должен проверять соответствие entity-классов существующей схеме,
# а не создавать или изменять таблицы автоматически.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
